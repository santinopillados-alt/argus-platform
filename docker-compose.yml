version: "3.9"

services:
  # ── Infraestructura ──────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: argus-postgres
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus_secret
      POSTGRES_DB: argus
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: argus-redis
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: argus-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: argus-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Gateway ──────────────────────────────────────────────────────
  gateway:
    build: ./services/gateway
    container_name: argus-gateway
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://argus:argus_secret@postgres:5432/argus
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/gateway:/app

  # ── Servicios core ───────────────────────────────────────────────
  watchdog-backend:
    build: ./services/watchdog/backend
    container_name: argus-watchdog
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://argus:argus_secret@postgres:5432/argus
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - gateway

  observe-iq:
    build: ./services/observe-iq
    container_name: argus-observe-iq
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://argus:argus_secret@postgres:5432/argus
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379
    depends_on:
      - gateway
      - kafka

  log-lens:
    build: ./services/log-lens/backend
    container_name: argus-log-lens
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://argus:argus_secret@postgres:5432/argus
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - gateway

  relay-sync:
    build: ./services/relay-sync
    container_name: argus-relay-sync
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://argus:argus_secret@postgres:5432/argus
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - gateway
      - kafka

  alerting:
    build: ./services/alerting
    container_name: argus-alerting
    ports:
      - "8005:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://argus:argus_secret@postgres:5432/argus
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    depends_on:
      - gateway
      - kafka

  tracer:
    build: ./services/tracer
    container_name: argus-tracer
    ports:
      - "8006:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://argus:argus_secret@postgres:5432/argus
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - gateway
      - kafka

  anomaly-ml:
    build: ./services/anomaly-ml
    container_name: argus-anomaly-ml
    ports:
      - "8007:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://argus:argus_secret@postgres:5432/argus
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - gateway
      - kafka

  incident:
    build: ./services/incident
    container_name: argus-incident
    ports:
      - "8008:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://argus:argus_secret@postgres:5432/argus
      REDIS_URL: redis://redis:6379
    depends_on:
      - gateway

  siem:
    build: ./services/siem
    container_name: argus-siem
    ports:
      - "8009:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://argus:argus_secret@postgres:5432/argus
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379
    depends_on:
      - gateway
      - kafka

  # ── Frontend ─────────────────────────────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: argus-dashboard
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - gateway

  # ── Reverse proxy ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: argus-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - gateway
      - dashboard

volumes:
  postgres_data: